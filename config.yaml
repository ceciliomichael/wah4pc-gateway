# WAH4PC Gateway Configuration
app:
  name: "wah4pc-gateway"
  version: "1.0.0"

server:
  host: "0.0.0.0"
  port: 3040
  base_url: "https://wah4pc.echosphere.cfd"  # Gateway's own URL (used for returnUrl)

security:
  master_key: "tcgtrio123"  # Master key for administrative access (leave empty to disable)

mongodb:
  uri: "mongodb://localhost:27017"
  database: "wah4pc_gateway"
  providers_collection: "providers"
  transactions_collection: "transactions"
  api_keys_collection: "api_keys"
  settings_collection: "settings"

logging:
  level: "info"  # debug, info, warn, error

validator:
  disabled: true
  url: "https://wah4pc-validator-api.echosphere.cfd"
  api_key: "dev-api-key-for-frontend"
