services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wah4pc-dashboard
    restart: always
    ports:
      - "3004:3004"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - wah4pc-network

networks:
  wah4pc-network:
    driver: bridge