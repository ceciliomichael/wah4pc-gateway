version: '3.8'

services:
  wah4validator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wah4validator
    ports:
      - "3041:3041"
    environment:
      # Override config.yaml settings via environment variables if needed
      - SERVER_PORT=3041
      - JAVA_VALIDATOR_PORT=9090
      - FHIR_VERSION=4.0.1
    volumes:
      # Mount config for easy editing without rebuild
      - ./config.yaml:/app/config.yaml:ro
      # Optionally mount resources if they change frequently
      # - ./resources:/app/resources:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s