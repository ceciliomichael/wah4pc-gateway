# WAH4PC Gateway Configuration
app:
  name: "wah4pc-gateway"
  version: "1.0.0"

server:
  host: "0.0.0.0"
  port: 8080
  base_url: "http://localhost:8080"  # Gateway's own URL (used for returnUrl)

security:
  master_key: "tcgtrio123"  # Master key for administrative access (leave empty to disable)

data:
  providers_path: "data/providers.json"
  transactions_path: "data/transactions.json"
  api_keys_path: "data/apikeys.json"

logging:
  level: "info"  # debug, info, warn, error