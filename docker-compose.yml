services:
  gateway:
    build: .
    container_name: wah4pc-gateway
    ports:
      - "3040:3040"
    volumes:
      - ./data:/app/data
      - ./log:/app/log
    environment:
      - SERVER_PORT=3040
      - SERVER_BASE_URL=https://wah4pc.echosphere.cfd
      - LOGGING_LEVEL=info
    restart: always
    networks:
      - wah4pc-network

networks:
  wah4pc-network:
    driver: bridge