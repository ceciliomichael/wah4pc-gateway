# WAH4PC FHIR Validator Configuration

# HTTP Server Settings
server:
  port: "8080"  # Port for the combined Go API + Frontend server

# Java Validator Settings
java_validator:
  port: "9090"           # Internal port for the Java validator process
  jar_path: "validator_cli.jar"  # Path to the FHIR validator JAR file
  java_path: "java"      # Java executable (use full path if not in PATH)
  ig_path: "resources"   # Path to Implementation Guide resources (e.g., PH Core profiles)

# FHIR Configuration
fhir:
  version: "4.0.1"  # FHIR specification version to validate against

# Security Settings
security:
  # Admin secret for managing API keys (used with X-Admin-Secret header)
  # IMPORTANT: Change this to a strong, unique secret in production
  admin_secret: "change_me_to_a_secure_secret"
  
  # Default API key for frontend validation requests
  # This key is used by the frontend UI to call the validation endpoint
  # Additional keys can be created via the API using the admin secret
  dev_api_key: "dev-api-key-for-frontend"
  
  # Rate limiting to prevent abuse
  rate_limit:
    requests_per_second: 20  # Maximum requests per second per API key
    burst: 20                # Maximum burst size for rate limiter

# Logging Configuration (optional - for future use)
# logging:
#   level: "info"  # Options: debug, info, warn, error
#   format: "json" # Options: json, text