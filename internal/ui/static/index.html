<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WAH4PC Gateway - Healthcare Providers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0f766e;
      --primary-light: #14b8a6;
      --bg: #f8fafc;
      --surface: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --success: #10b981;
      --error: #ef4444;
      --radius: 16px;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* Header */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 0;
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(8px);
      background: rgba(255, 255, 255, 0.9);
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text-main);
    }

    .brand-logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 16px;
      box-shadow: var(--shadow-sm);
    }

    .brand-text {
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .status-badge {
      font-size: 12px;
      font-weight: 600;
      color: var(--primary);
      background: #ccfbf1;
      padding: 4px 12px;
      border-radius: 100px;
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: 80px 0 60px;
    }

    .hero h1 {
      font-size: 40px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
      color: var(--text-main);
    }

    .hero p {
      font-size: 18px;
      color: var(--text-muted);
      max-width: 600px;
      margin: 0 auto;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
      padding-bottom: 80px;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
      border-color: #cbd5e1;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .provider-icon {
      width: 48px;
      height: 48px;
      background: #f1f5f9;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
    }

    .provider-icon svg {
      width: 24px;
      height: 24px;
    }

    .active-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 100px;
    }

    .active-indicator.active {
      background: #dcfce7;
      color: #15803d;
    }

    .active-indicator.inactive {
      background: #fee2e2;
      color: #b91c1c;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .card-body h3 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .card-body p {
      font-size: 14px;
      color: var(--text-muted);
      text-transform: capitalize;
    }

    .card-footer {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid #f1f5f9;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--text-muted);
    }

    .id-pill {
      background: #f1f5f9;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: monospace;
    }

    /* Loading & Empty States */
    .state-container {
      text-align: center;
      padding: 60px 0;
      color: var(--text-muted);
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #e2e8f0;
      border-top-color: var(--primary);
      border-radius: 50%;
      margin: 0 auto 16px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    footer {
      text-align: center;
      padding: 40px 0;
      color: var(--text-muted);
      font-size: 14px;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<header>
  <div class="container header-inner">
    <a href="#" class="brand">
      <div class="brand-logo">W4</div>
      <span class="brand-text">WAH4PC Gateway</span>
    </a>
    <span class="status-badge">FHIR R4 Ready</span>
  </div>
</header>

<main>
  <section class="hero">
    <div class="container">
      <h1>Healthcare Partners</h1>
      <p>Seamlessly connected facilities exchanging health data securely.</p>
    </div>
  </section>

  <div class="container">
    <div id="grid" class="grid">
      <div class="state-container">
        <div class="spinner"></div>
        <p>Loading providers...</p>
      </div>
    </div>
  </div>
</main>

<footer>
  <div class="container">
    <p>&copy; 2026 WAH4PC Gateway. Promoting interoperability.</p>
  </div>
</footer>

<script>
  // Icons mapping based on provider type
  const icons = {
    hospital: `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 21h19.5m-18-18v18m10.5-18v18m6-13.5V21M6.75 6.75h.75m-.75 3h.75m-.75 3h.75m3-6h.75m-.75 3h.75m-.75 3h.75M6.75 21v-3.375c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21M3 3h12m-.75 4.5H21m-3.75 3.75h.008v.008h-.008v-.008Zm0 3h.008v.008h-.008v-.008Zm0 3h.008v.008h-.008v-.008Z" /></svg>`,
    clinic: `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21v-8.25M15.75 21v-8.25M8.25 21v-8.25M3 9l9-6 9 6m-1.5 12V10.332A48.36 48.36 0 0 0 12 9.75c-2.551 0-5.056.2-7.5.582V21M3 21h18M12 6.75h.008v.008H12V6.75Z" /></svg>`,
    laboratory: `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 3.104v5.714a2.25 2.25 0 0 1-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 0 1 4.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19.8 15.3M14.25 3.104c.251.023.501.05.75.082M19.8 15.3l-1.57.393A9.065 9.065 0 0 1 12 15a9.065 9.065 0 0 0-6.23-.693L5 14.5m14.8.8 1.402 1.402c1.232 1.232.65 3.318-1.067 3.611A48.309 48.309 0 0 1 12 21c-2.773 0-5.491-.235-8.135-.687-1.718-.293-2.3-2.379-1.067-3.61L5 14.5" /></svg>`,
    pharmacy: `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6a7.5 7.5 0 1 0 7.5 7.5h-7.5V6Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 10.5H21A7.5 7.5 0 0 0 13.5 3v7.5Z" /></svg>`,
    default: `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21v-8.25M15.75 21v-8.25M8.25 21v-8.25M3 9l9-6 9 6m-1.5 12V10.332A48.36 48.36 0 0 0 12 9.75c-2.551 0-5.056.2-7.5.582V21M3 21h18M12 6.75h.008v.008H12V6.75Z" /></svg>`
  };

  async function fetchProviders() {
    const grid = document.getElementById('grid');
    
    try {
      const res = await fetch('/api/v1/providers');
      if (!res.ok) throw new Error('Failed');
      
      const json = await res.json();
      // Handle the wrapped response structure (success/data) or direct array
      const providers = Array.isArray(json) ? json : (json.data || []);

      if (providers.length === 0) {
        grid.innerHTML = `
          <div class="state-container" style="grid-column: 1/-1;">
            <h3>No Providers Yet</h3>
            <p>Healthcare facilities will appear here once connected.</p>
          </div>
        `;
        return;
      }

      grid.innerHTML = providers.map(p => {
        const icon = icons[p.type] || icons.default;
        const statusClass = p.isActive ? 'active' : 'inactive';
        const statusText = p.isActive ? 'Active' : 'Offline';
        
        return `
          <div class="card">
            <div class="card-header">
              <div class="provider-icon">${icon}</div>
              <div class="active-indicator ${statusClass}">
                <div class="dot"></div>
                ${statusText}
              </div>
            </div>
            <div class="card-body">
              <h3>${escape(p.name)}</h3>
              <p>${escape(p.type)}</p>
            </div>
            <div class="card-footer">
              <span>ID: <span class="id-pill">${escape(p.id)}</span></span>
            </div>
          </div>
        `;
      }).join('');

    } catch (e) {
      grid.innerHTML = `
        <div class="state-container" style="grid-column: 1/-1; color: var(--error);">
          <h3>Connection Failed</h3>
          <p>Unable to load provider data.</p>
        </div>
      `;
    }
  }

  function escape(str) {
    const div = document.createElement('div');
    div.innerText = str;
    return div.innerHTML;
  }

  fetchProviders();
</script>

</body>
</html>
